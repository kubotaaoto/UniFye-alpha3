<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Tech University • Messages</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Top Header -->
        <header class="top-header">
            <div class="university-brand">
                <img src="images/texas-tech-logo.png" alt="Texas Tech University" class="uni-logo">
                <span class="uni-name">Texas Tech University</span>
            </div>
            <div class="user-info">
                <span class="user-name">Kakamyrat Mammedov</span>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <nav class="nav-menu">
                    <a href="#" class="nav-item active">
                        <i class="fas fa-home"></i>
                        <span>Friends</span>
                    </a>
                </nav>

                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search conversations">
                    </div>
                </div>

                <div class="friends-list">
                    <div class="friends-header">
                        <span>Friends</span>
                    </div>
                    
                    <!-- Friend items will be populated by JS -->
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area">
                <!-- Chat Header -->
                <div class="chat-header">
                    <div class="chat-user">
                        <div class="avatar online">
                            <img src="images/chris.jpg" alt="Chris">
                        </div>
                        <div class="chat-user-info">
                            <span class="chat-username">Chris</span>
                            <span class="status online">Online</span>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="icon-btn"><i class="fas fa-phone"></i></button>
                        <button class="icon-btn"><i class="fas fa-video"></i></button>
                        <button class="icon-btn"><i class="fas fa-ellipsis-v"></i></button>
                    </div>
                </div>

                <!-- Messages -->
                <div class="messages-container" id="messages-container">
                    <!-- Messages populated by JS -->
                </div>

                <!-- Message Input -->
                <div class="message-input-area">
                    <div class="input-wrapper">
                        <button class="attach-btn"><i class="fas fa-plus"></i></button>
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                        <button class="emoji-btn"><i class="fas fa-smile"></i></button>
                        <button class="send-btn" id="send-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
