<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniFye - Student Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="top-header">
        <div class="university-brand">
            <img src="images/texas-tech-logo.png" alt="TTU Logo" class="uni-logo">
            <span class="uni-name">Texas Tech University</span>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-btn">🏠 Home</a>
            <a href="messages.html" class="nav-btn">✉️ Messages</a>
            <a href="profile.html" class="nav-btn">👤 Profile</a>
            <a href="login.html" class="nav-btn active">🔓 Login</a>
        </nav>
    </header>

    <main class="login-container">
        <section class="card">
            <div class="card-header">
                <h1 class="ttu-brand-title">Texas Tech University</h1>
                <p class="subtitle">UniFye • Student Portal</p>
            </div>

            <h2>Log in to your account</h2>

            <form action="index.html" method="get" class="data-entry-form">
                
                <div class="form-group">
                    <label for="user-email">Institutional Email</label>
                    <input type="email" id="user-email" name="email" placeholder="e.g., raider@ttu.edu" required>
                </div>

                <div class="form-group">
                    <label for="user-password">Password</label>
                    <input type="password" id="user-password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="login-role">Login as:</label>
                    <select id="login-role" name="role">
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember-me" name="remember">
                    <label for="remember-me">Keep me logged in</label>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
                
                <button type="button" class="btn btn-secondary" onclick="location.href='index.html'">Cancel</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <button class="btn btn-google" onclick="alert('Google login integration coming in Milestone 3')">
                Continue with Google
            </button>

            <footer class="card-footer">
                <p>Don't have an account? <a href="#">Sign up</a></p>
            </footer>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Texas Tech University - UniFye Project</p>
    </footer>
</body>
</html>
