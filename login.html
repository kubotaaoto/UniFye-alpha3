<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Tech University - Login</title>
</head>
<body>

<header>
    <div class="login-label">Login</div>
    <div class="header-content">
        <div class="logo">T</div> <span class="uni-name">Texas Tech University</span>
        <span class="user-name">Sean Kubota</span>
    </div>
</header>

<main>
    <div class="login-card">
        <h2>Log in to your account</h2>
        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="login-button">Login</button>
        </form>

        <div class="divider"></div>

        <button type="button" class="google-button">
            <span class="google-icon">G</span> Continue with Google
        </button>

        <div class="card-footer">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>
</main>

</body>
</html>
